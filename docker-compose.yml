services:
  roxane-belanger-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4269:80"
    container_name: roxane-belanger-v2
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
