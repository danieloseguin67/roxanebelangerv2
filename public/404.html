<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>RoxaneBelangerApp</title>
  <script type="text/javascript">
    // Hash-based SPA routing fix for GitHub Pages and static hosting.
    // Since the app uses Angular hash routing, we redirect any deep-link
    // to the base URL with the route encoded as a hash fragment.
    var l = window.location;
    var isGitHubPages = l.hostname === 'danieloseguin67.github.io';

    if (isGitHubPages) {
      // Extract the route path after the repo segment (/roxanebelangerv2)
      var pathParts = l.pathname.split('/');
      // pathParts: ['', 'roxanebelangerv2', 'route', ...]
      var routePath = '/' + pathParts.slice(2).filter(Boolean).join('/');
      l.replace(
        l.protocol + '//' + l.hostname + '/roxanebelangerv2/' +
        '#' + routePath +
        (l.search || '')
      );
    } else {
      // Custom domain: redirect to index with hash
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/#' + l.pathname +
        (l.search || '')
      );
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
